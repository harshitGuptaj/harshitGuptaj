name: Generate Snake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: harshitGuptaj
          outputs: |
            dist/github-snake.svg?palette=green

      - name: Convert CSS variables to inline fill
        run: |
          for f in dist/*.svg; do
            sed -i \
              -e 's/var(--ce)/#0d1117/g' \
              -e 's/var(--c0)/#0e4429/g' \
              -e 's/var(--c1)/#006d32/g' \
              -e 's/var(--c2)/#26a641/g' \
              -e 's/var(--c3)/#39d353/g' \
              -e 's/var(--cs)/#ffffff/g' \
              -e 's/var(--cb)/#1b1f230a/g' \
              "$f"
            echo "Fixed: $f"
          done

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true
          enable_jekyll: true
