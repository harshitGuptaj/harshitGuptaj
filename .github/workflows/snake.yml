name: Generate Snake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0

      - uses: Platane/snk@v3
        with:
          github_user_name: harshitGuptaj
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ffffff&color_dots=#000000,#1a1a1a,#333333,#666666,#ffffff

      - run: |
          cp dist/github-snake.svg . 2>/dev/null || true
          cp dist/github-snake-dark.svg . 2>/dev/null || true

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update snake $(date +'%Y-%m-%d %H:%M')"
          git push
